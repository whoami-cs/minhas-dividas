services:
  - type: web
    name: minhas-dividas-api
    runtime: node
    region: oregon
    plan: starter
    buildCommand: cd api && npm install
    startCommand: cd api && npm start
    envVars:
      - key: PORT
        value: 3001
      - key: DATABASE_URL
        sync: false
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
      - key: SUPABASE_SERVICE_ROLE_KEY
        sync: false
      - key: GEMINI_API_KEYS
        sync: false

  - type: web
    name: minhas-dividas-frontend
    runtime: static
    region: oregon
    plan: starter
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

  # Cron Job - Consulta diária
  - type: cron
    name: minhas-dividas-daily-query
    runtime: node
    region: oregon
    plan: starter
    schedule: "0 12 * * *"
    buildCommand: cd api && npm install
    startCommand: node -e "console.log('Daily query executed')"
    envVars:
      - key: SUPABASE_URL
        sync: false
      - key: SUPABASE_KEY
        sync: false
